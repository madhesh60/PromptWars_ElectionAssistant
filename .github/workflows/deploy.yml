name: 🚀 Deploy & Validate

on:
  push:
    branches: ["main", "master"]

jobs:
  # ─────────────────────────────────────────────
  # 1. Production Readiness Checks
  # ─────────────────────────────────────────────
  production-checks:
    name: 🏭 Production Readiness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Install root deps
        run: npm ci

      - name: Install backend deps
        run: npm ci
        working-directory: backend

      - name: Check for .env files accidentally committed
        run: |
          if git log --name-only --format="" -1 | grep -q '\.env$'; then
            echo "❌ ERROR: .env file was committed!"
            exit 1
          fi
          echo "✅ No .env file committed"

      - name: Verify all required files exist
        run: |
          files=(
            "backend/server.js"
            "backend/config/constants.js"
            "backend/middleware/validation.js"
            "frontend/index.html"
            "frontend/style.css"
            ".env.example"
            "README.md"
          )
          for f in "${files[@]}"; do
            if [ ! -f "$f" ]; then
              echo "❌ Missing required file: $f"
              exit 1
            fi
          done
          echo "✅ All required files present"

      - name: Validate .env.example has all required keys
        run: |
          required_keys=("GEMINI_API_KEY" "GOOGLE_TTS_API_KEY")
          for key in "${required_keys[@]}"; do
            if ! grep -q "^$key" .env.example; then
              echo "❌ Missing key in .env.example: $key"
              exit 1
            fi
          done
          echo "✅ .env.example is complete"

      - name: Run full backend test suite
        run: npm test -- --forceExit
        working-directory: backend
        env:
          GEMINI_API_KEY: test-key
          GOOGLE_TTS_API_KEY: test-tts-key
          NODE_ENV: test

  # ─────────────────────────────────────────────
  # 2. Lighthouse Accessibility & Performance
  # ─────────────────────────────────────────────
  lighthouse:
    name: 🔦 Lighthouse Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ".lighthouserc.json"
          uploadArtifacts: true
          temporaryPublicStorage: true
        continue-on-error: true
