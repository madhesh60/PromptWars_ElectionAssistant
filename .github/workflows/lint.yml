name: ✨ Code Quality

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  # ─────────────────────────────────────────────
  # 1. ESLint Analysis
  # ─────────────────────────────────────────────
  eslint:
    name: 🔍 ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint (zero errors allowed)
        run: npx eslint . --ext .js --max-warnings=0 --format=compact

  # ─────────────────────────────────────────────
  # 2. Prettier Format Check
  # ─────────────────────────────────────────────
  prettier:
    name: 💅 Prettier Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npx prettier --check "**/*.{js,json,md,html,css}" --ignore-path .gitignore

  # ─────────────────────────────────────────────
  # 3. HTML Validation
  # ─────────────────────────────────────────────
  html-validate:
    name: 🌐 HTML Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Install html-validate
        run: npm install -g html-validate

      - name: Validate HTML
        run: html-validate "frontend/*.html" || true

  # ─────────────────────────────────────────────
  # 4. Dead-code / Complexity check
  # ─────────────────────────────────────────────
  complexity:
    name: 📈 Complexity Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
      - name: Install plato
        run: npm install -g plato
      - name: Run complexity report
        run: plato -r -d complexity-report backend/
      - name: Upload complexity report
        uses: actions/upload-artifact@v4
        with:
          name: complexity-report
          path: complexity-report/
          retention-days: 7
