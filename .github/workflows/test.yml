name: 🧪 Test Suite (CI)

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # 1. Unit + Integration Tests (multi-OS matrix)
  # ─────────────────────────────────────────────
  unit-tests:
    name: Unit & Integration Tests (${{ matrix.os }} / Node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: ["18.x", "20.x"]

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: 📦 Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: 🧪 Run Jest tests with coverage
        run: npm test -- --coverage --coverageReporters=text --coverageReporters=lcov --forceExit
        working-directory: backend
        env:
          GEMINI_API_KEY: test-key-ci
          GOOGLE_TTS_API_KEY: test-tts-key-ci
          NODE_ENV: test

      - name: 📊 Upload coverage report
        if: matrix.os == 'ubuntu-latest' && matrix.node == '20.x'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage/
          retention-days: 14

      - name: 🚦 Enforce 70% coverage threshold
        if: matrix.os == 'ubuntu-latest' && matrix.node == '20.x'
        run: |
          npm test -- --coverage --coverageThreshold='{"global":{"lines":70,"functions":70,"branches":60,"statements":70}}' --forceExit
        working-directory: backend
        env:
          GEMINI_API_KEY: test-key-ci
          GOOGLE_TTS_API_KEY: test-tts-key-ci
          NODE_ENV: test

  # ─────────────────────────────────────────────
  # 2. Middleware & Validation Unit Tests
  # ─────────────────────────────────────────────
  middleware-tests:
    name: 🛡️ Middleware & Validation Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
        working-directory: backend
      - name: Run middleware-specific tests
        run: npm test -- --testPathPattern="middleware|validation|security" --forceExit
        working-directory: backend
        env:
          NODE_ENV: test

  # ─────────────────────────────────────────────
  # 3. E2E Static HTML Smoke Tests
  # ─────────────────────────────────────────────
  e2e-smoke:
    name: 🌐 E2E Smoke Tests (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"
      - name: Install root dependencies
        run: npm ci
      - name: Install Playwright browsers (Chromium only)
        run: npx playwright install chromium --with-deps
      - name: Run Playwright smoke tests
        run: npx playwright test --reporter=html
        env:
          CI: true
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  # ─────────────────────────────────────────────
  # 4. All-green gate
  # ─────────────────────────────────────────────
  all-green:
    name: ✅ All Tests Passed
    needs: [unit-tests, middleware-tests, e2e-smoke]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs succeeded
        run: |
          if [ "${{ needs.unit-tests.result }}" != "success" ] || \
             [ "${{ needs.middleware-tests.result }}" != "success" ] || \
             [ "${{ needs.e2e-smoke.result }}" != "success" ]; then
            echo "One or more test jobs failed!"
            exit 1
          fi
          echo "All test jobs passed! 🎉"
